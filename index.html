<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Links Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="profile-card">
            <!-- Profile Image -->
            <img src="./assets/avatar.jpg" alt="Profile Picture" class="profile-image">
            
            <!-- Profile Name -->
            <h1 class="profile-name">Diana Movchan</h1>
            
            <!-- Profile Location -->
            <p class="profile-location">Ukraine</p>
            
            <!-- Profile Bio -->
            <p class="profile-bio">"The only way to do great work is to love what you do."</p>
            
            <!-- Social Links -->
            <nav class="social-links">
                <a href="https://github.com" class="social-link">GitHub</a>
                <a href="https://frontendmentor.io" class="social-link">Frontend Mentor</a>
                <a href="https://twitter.com" class="social-link">Twitter</a>
                <a href="https://linkedin.com" class="social-link">LinkedIn</a>
                <a href="https://instagram.com" class="social-link">Instagram</a>
            </nav>
        </div>
    </main>
</body>
</html>
